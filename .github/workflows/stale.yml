name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'Dieses Issue wurde 30 Tage nicht aktualisiert und als veraltet markiert.'
          stale-pr-message: 'Dieser Pull Request wurde 30 Tage nicht aktualisiert und als veraltet markiert.'
          close-issue-message: 'Dieses Issue wurde nach 7 weiteren Tagen Inaktivität automatisch geschlossen.'
          close-pr-message: 'Dieser Pull Request wurde nach 7 weiteren Tagen Inaktivität automatisch geschlossen.'
          days-before-stale: 30
          days-before-close: 7